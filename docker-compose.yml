# Docker Compose for judge_system
# Full-stack container orchestration

name: judge_system

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: judge_system-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://server:3001
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - judge_system-network

  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: judge_system-server
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:password@db:5432/judge_system
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - judge_system-network

  db:
    image: postgres:16-alpine
    container_name: judge_system-postgres
    environment:
      POSTGRES_DB: judge_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - judge_system_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - judge_system-network

networks:
  judge_system-network:
    driver: bridge

volumes:
  judge_system_postgres_data:
