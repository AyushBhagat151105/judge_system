name: judge_system

services:
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: judge_system-web
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  server:
    build:
      context: .
      dockerfile: ./apps/server/Dockerfile
    container_name: judge_system-server
    ports:
      - "3002:3000"
    env_file:
      - .env
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
